<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand">Mi Perfil</span>
        <div>
            <a id="btnAdmin" href="users.html" class="btn btn-outline-light me-2" style="display: none;">
                <i class="fas fa-users-cog"></i> Panel Admin
            </a>
            <button onclick="logout()" class="btn btn-danger">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-white text-center py-4">
                    <i class="fas fa-user-circle fa-5x text-secondary mb-3"></i>
                    <h3 id="txtNameDisplay">Cargando...</h3>
                    <span id="badgeRole" class="badge bg-info text-dark">USER</span>
                </div>
                <div class="card-body">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label text-muted">Nombre Completo</label>
                            <input type="text" id="txtName" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Correo Electrónico</label>
                            <input type="email" id="txtEmail" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Teléfono</label>
                            <input type="text" id="txtPhone" class="form-control" readonly>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="button" id="btnEdit" onclick="enableEditing()" class="btn btn-warning">
                                <i class="fas fa-edit"></i> Editar Datos
                            </button>
                            <button type="button" id="btnSave" onclick="saveProfile()" class="btn btn-success" style="display: none;">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
