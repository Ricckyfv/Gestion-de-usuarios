<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SB Admin 2 - Registro</title>

    <link href="https://fonts.googleapis.com/css?family=Nunito:200,400,600,700,800" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4e73df;
            --bg-gradient: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            /* Mismo fondo que el login para consistencia de marca */
            background-image: radial-gradient(at 0% 0%, hsla(227,62%,59%,1) 0, transparent 50%),
                              radial-gradient(at 50% 0%, hsla(225,57%,47%,1) 0, transparent 50%),
                              radial-gradient(at 100% 0%, hsla(231,67%,52%,1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2) !important;
        }

        /* Imagen lateral - Usamos una temática de "comienzo/crecimiento" */
        .bg-register-image {
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1351&q=80');
            background-position: center;
            background-size: cover;
            position: relative;
        }

        .bg-register-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(78, 115, 223, 0.1);
        }

        .form-control-user {
            border-radius: 10px !important;
            padding: 1.5rem 1rem !important;
            border: 1px solid #d1d3e2;
            transition: all 0.3s ease;
        }

        .form-control-user:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.1);
            transform: translateY(-2px);
        }

        .btn-user {
            border-radius: 10px !important;
            padding: 0.8rem !important;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: var(--bg-gradient);
            border: none;
            color: white;
        }

        .btn-user:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(78, 115, 223, 0.4);
            color: white;
        }

        .small {
            color: #858796;
            transition: color 0.3s;
            font-weight: 600;
        }

        .small:hover {
            color: var(--primary-color);
            text-decoration: none;
        }

        h1.h4 {
            font-weight: 800;
            color: #3a3b45;
        }

        hr {
            border-top: 1px solid #e3e6f0;
            margin: 1.5rem 0;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-10 col-lg-12 col-md-10">
            <div class="card o-hidden border-0 my-5">
                <div class="card-body p-0">
                    <div class="row">
                        <div class="col-lg-5 d-none d-lg-block bg-register-image"></div>

                        <div class="col-lg-7">
                            <div class="p-5">
                                <div class="text-center mb-4">
                                    <h1 class="h4 mb-2">Crea una cuenta</h1>
                                    <p class="text-muted small">Únete a nuestra comunidad hoy mismo</p>
                                </div>

                                <form class="user">
                                    <div class="form-group">
                                        <input type="text" class="form-control form-control-user" id="txtName"
                                               placeholder="Nombre Completo">
                                    </div>

                                    <div class="form-group">
                                        <input type="email" class="form-control form-control-user" id="txtEmail"
                                               placeholder="Correo Electrónico">
                                    </div>

                                    <div class="form-group">
                                        <input type="tel" class="form-control form-control-user" id="txtPhoneNumber"
                                               placeholder="Número de Teléfono">
                                    </div>

                                    <div class="form-group row">
                                        <div class="col-sm-6 mb-3 mb-sm-0">
                                            <input type="password" class="form-control form-control-user"
                                                   id="txtPassword" placeholder="Contraseña">
                                        </div>
                                        <div class="col-sm-6">
                                            <input type="password" class="form-control form-control-user"
                                                   id="txtRepeatPassword" placeholder="Repetir Contraseña">
                                        </div>
                                    </div>

                                    <button onclick="register(); return false;" class="btn btn-primary btn-user btn-block mt-4">
                                        Registrar Cuenta
                                    </button>
                                </form>

                                <hr>

                                <div class="text-center">
                                    <a class="small" href="login.html">¿Ya tienes cuenta? ¡Inicia sesión!</a>
                                </div>
                                <div class="text-center mt-2">
                                    <a class="small" href="index.html">
                                        <i class="fas fa-home fa-sm"></i> Volver al inicio
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/register.js"></script>

</body>

</html>
