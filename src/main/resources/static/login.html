<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Acceso al Sistema</title>

    <link href="https://fonts.googleapis.com/css?family=Nunito:200,400,600,700,800" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #224abe;
            --bg-gradient: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #f8f9fc;
            background-image: radial-gradient(at 0% 0%, hsla(227,62%,59%,1) 0, transparent 50%),
                              radial-gradient(at 50% 0%, hsla(225,57%,47%,1) 0, transparent 50%),
                              radial-gradient(at 100% 0%, hsla(231,67%,52%,1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2) !important;
        }

        /* Imagen del lado izquierdo */
        .bg-login-image {
            background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-position: center;
            background-size: cover;
            position: relative;
        }

        .bg-login-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(78, 115, 223, 0.1); /* Tinte azul suave sobre la imagen */
        }

        .form-control-user {
            border-radius: 10px !important;
            padding: 1.5rem 1rem !important;
            border: 1px solid #d1d3e2;
            transition: all 0.3s ease;
        }

        .form-control-user:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.1);
            transform: translateY(-2px);
        }

        .btn-user {
            border-radius: 10px !important;
            padding: 0.8rem !important;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: var(--bg-gradient);
            border: none;
        }

        .btn-user:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(78, 115, 223, 0.4);
        }

        .small {
            color: #858796;
            transition: color 0.3s;
        }

        .small:hover {
            color: var(--primary-color);
            text-decoration: none;
        }

        h1.h4 {
            font-weight: 800;
            color: #3a3b45;
        }

        .container {
            max-width: 1000px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-10 col-lg-12 col-md-9">
            <div class="card o-hidden border-0 my-5">
                <div class="card-body p-0">
                    <div class="row">
                        <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>

                        <div class="col-lg-6">
                            <div class="p-5">
                                <div class="text-center mb-4">
                                    <h1 class="h4 mb-2">¡Bienvenido de nuevo!</h1>
                                    <p class="text-muted small">Ingresa tus credenciales para continuar</p>
                                </div>
                                <form class="user">
                                    <div class="form-group">
                                        <input type="email" class="form-control form-control-user"
                                               id="email" placeholder="Correo electrónico...">
                                    </div>
                                    <div class="form-group mb-4">
                                        <input type="password" class="form-control form-control-user"
                                               id="password" placeholder="Contraseña">
                                    </div>
                                    <button type="button" onclick="loginUser()"
                                            class="btn btn-primary btn-user btn-block">
                                        Iniciar Sesión
                                    </button>
                                </form>
                                <hr>
                                <div class="text-center">
                                    <a class="small" href="register.html">¿No tienes cuenta? ¡Regístrate!</a>
                                </div>
                                <div class="text-center mt-2">
                                    <a class="small" href="index.html">
                                        <i class="fas fa-arrow-left fa-sm"></i> Volver al inicio
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>

</body>
</html>
